<h1 style="text-align: center;">Counter APP</h1>
<div>
  <div style="text-align: center;">
    <h2 class="n">{{count}}</h2>
    <button (click)="handleCounter('plus')" class="btn bg-red">Increment</button>
    <button (click)="handleCounter('minus')" class="btn bg-green">Decrement</button>
    <button (click)="handleCounter('reset')" class="btn bg-black">Reset</button>
  </div>
</div>
