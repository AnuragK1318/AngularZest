<h1 style="text-align: center;">DAY 3 Tasks</h1>
@if (errorMessage) {
  <div class="error">
    {{errorMessage}}
  </div>
}

<div class="container">
@for (post of posts; track post.id) {
  <div class="card">
    <h3>Post Id : {{post.id}}</h3>
    <h3>Post Title : {{post.title}}</h3>
    <p>{{post.body}}</p>
  </div>
}
</div>
